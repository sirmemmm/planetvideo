<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV SOLAR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080816;font-family:'Courier New',monospace;cursor:grab}
body:active{cursor:grabbing}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.03) 3px,rgba(0,0,0,0.03) 4px);z-index:200;pointer-events:none}
#c3d{position:fixed;inset:0;z-index:1}
#c2d{position:fixed;inset:0;z-index:2;pointer-events:none}
#noise{position:fixed;inset:0;z-index:199;pointer-events:none;opacity:0.012;mix-blend-mode:screen}

.ui-title{position:fixed;top:20px;left:24px;z-index:300;color:#44ddff;font-size:1.4rem;font-weight:bold;letter-spacing:.25em;text-transform:uppercase;pointer-events:none;user-select:none;animation:tG 6s infinite}
@keyframes tG{0%,93%,100%{transform:translate(0);color:#44ddff}94%{transform:translate(-3px,1px);color:#ff4488}95%{transform:translate(2px,-1px);color:#44ff88}96%{transform:translate(0);color:#44ddff}}
.ui-hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none;user-select:none;color:#3a4a58;font-size:.55rem;letter-spacing:.1em;white-space:nowrap}

.mode-toggle{position:fixed;top:20px;right:22px;z-index:300;display:flex;align-items:center;gap:8px;user-select:none}
.mode-toggle span{color:#445;font-size:.55rem;letter-spacing:.06em;transition:color .3s}
.mode-toggle span.active{color:#44ddff}
.toggle-track{width:34px;height:16px;background:#111;border:1px solid #2a3a48;border-radius:8px;cursor:pointer;position:relative;transition:border-color .3s}
.toggle-track:hover{border-color:#44ddff}
.toggle-knob{width:12px;height:12px;background:#556;border-radius:50%;position:absolute;top:1px;left:1px;transition:left .25s,background .25s}
.toggle-track.on .toggle-knob{left:19px;background:#44ddff}

.ui-side{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:300;display:flex;flex-direction:column;gap:3px}
.ui-side button{width:28px;height:28px;border:1px solid #2a3a48;background:rgba(8,8,20,.85);color:#556;font-size:.9rem;cursor:pointer;font-family:'Courier New',monospace;transition:color .2s,border-color .2s}
.ui-side button:hover{color:#ff4488;border-color:#ff4488}
.ui-reset{position:fixed;bottom:14px;left:24px;z-index:300;border:1px solid #2a3a48;background:rgba(8,8,20,.85);color:#3a4a58;font-size:.5rem;padding:3px 8px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.06em;transition:color .2s,border-color .2s}
.ui-reset:hover{color:#ff4488;border-color:#ff4488}
.ui-blackhole{position:fixed;bottom:14px;right:24px;z-index:300;border:1px solid #2a3a48;background:rgba(8,8,20,.85);color:#aa44ff;font-size:.55rem;padding:5px 12px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.08em;transition:color .2s,border-color .2s,box-shadow .3s;text-transform:uppercase}
.ui-blackhole:hover{color:#dd66ff;border-color:#dd66ff;box-shadow:0 0 15px rgba(170,68,255,0.3)}
.ui-blackhole.active{color:#ff2266;border-color:#ff2266;animation:bhPulse 0.5s infinite}
@keyframes bhPulse{0%,100%{box-shadow:0 0 10px rgba(255,34,102,0.3)}50%{box-shadow:0 0 25px rgba(255,34,102,0.6)}}

.shape-picker{position:fixed;bottom:42px;left:50%;transform:translateX(-50%);z-index:300;display:flex;gap:3px;background:rgba(8,8,20,.92);border:1px solid #2a3a48;border-radius:20px;padding:4px 8px;backdrop-filter:blur(6px)}
.shape-btn{border:1px solid transparent;background:none;color:#556;font-size:.5rem;padding:3px 7px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.04em;border-radius:12px;transition:color .2s,border-color .2s,background .2s;white-space:nowrap}
.shape-btn:hover{color:#44ddff;border-color:rgba(68,221,255,0.3)}
.shape-btn.active{color:#44ddff;border-color:#44ddff;background:rgba(68,221,255,0.08)}

.planet-controls{position:fixed;top:56px;right:22px;z-index:300;display:flex;align-items:center;gap:5px}
.planet-btn{width:24px;height:24px;border:1px solid #2a3a48;background:rgba(8,8,20,.85);color:#556;font-size:.9rem;cursor:pointer;font-family:'Courier New',monospace;border-radius:50%;transition:color .2s,border-color .2s;display:flex;align-items:center;justify-content:center;line-height:1}
.planet-btn:hover{color:#44ddff;border-color:#44ddff}
.planet-count{color:#44ddff;font-size:.6rem;letter-spacing:.05em;min-width:16px;text-align:center}
.planet-lbl{color:#3a4a58;font-size:.45rem;letter-spacing:.06em}

/* Upload button */
.ui-upload{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:300;border:1px solid #2a3a48;background:rgba(8,8,20,.92);color:#22cc88;font-size:.55rem;padding:5px 14px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.08em;border-radius:14px;transition:color .2s,border-color .2s,box-shadow .3s;text-transform:uppercase}
.ui-upload:hover{color:#44ffaa;border-color:#44ffaa;box-shadow:0 0 12px rgba(68,255,170,0.2)}
.ui-upload.uploading{color:#ddaa22;border-color:#ddaa22;pointer-events:none;animation:uploadPulse 1s infinite}
@keyframes uploadPulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* Upload overlay */
.upload-overlay{position:fixed;inset:0;z-index:400;background:rgba(3,3,12,.85);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.upload-overlay.visible{display:flex}
.upload-box{border:2px dashed #2a3a48;border-radius:16px;padding:40px 60px;text-align:center;transition:border-color .3s,background .3s;max-width:400px}
.upload-box.dragover{border-color:#44ddff;background:rgba(68,221,255,0.05)}
.upload-box h3{color:#44ddff;font-size:.8rem;letter-spacing:.15em;margin-bottom:12px;font-family:'Courier New',monospace}
.upload-box p{color:#3a4a58;font-size:.5rem;letter-spacing:.06em;margin-bottom:16px;font-family:'Courier New',monospace}
.upload-box input[type=file]{display:none}
.upload-box .pick-btn{border:1px solid #22cc88;background:none;color:#22cc88;font-size:.55rem;padding:6px 18px;cursor:pointer;font-family:'Courier New',monospace;letter-spacing:.06em;border-radius:10px;transition:all .2s}
.upload-box .pick-btn:hover{background:rgba(34,204,136,0.1);color:#44ffaa;border-color:#44ffaa}
.upload-box .close-btn{position:absolute;top:20px;right:24px;border:none;background:none;color:#556;font-size:1.2rem;cursor:pointer;font-family:'Courier New',monospace;transition:color .2s}
.upload-box .close-btn:hover{color:#ff4488}
.upload-progress{color:#ddaa22;font-size:.5rem;margin-top:10px;font-family:'Courier New',monospace;letter-spacing:.06em;display:none}

/* Card shape variants */
.tv-card:not(.card-tv) .tv-stand,.tv-card:not(.card-tv) .tv-base{display:none}
.tv-card.card-sphere .tv-frame{border-radius:50%;overflow:hidden}
.tv-card.card-sphere video{aspect-ratio:1/1;object-fit:cover}
.tv-card.card-sphere .tv-antenna{display:none}
.tv-card.card-sphere .tv-frame::before{border-radius:50%}
.tv-card.card-diamond .tv-frame{clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);border:none;padding:8px;overflow:hidden}
.tv-card.card-diamond video{aspect-ratio:1/1;object-fit:cover}
.tv-card.card-diamond .tv-antenna,.tv-card.card-diamond .tv-led{display:none}
.tv-card.card-diamond .tv-frame::before{display:none}
.tv-card.card-cube .tv-frame{border-radius:0;border-width:4px}
.tv-card.card-cube video{aspect-ratio:1/1;object-fit:cover}
.tv-card.card-cube .tv-antenna{display:none}
.tv-card.card-donut .tv-frame{border-radius:50%;border-width:6px;overflow:hidden;padding:8px}
.tv-card.card-donut video{aspect-ratio:1/1;object-fit:cover;border-radius:50%}
.tv-card.card-donut .tv-antenna{display:none}
.tv-card.card-donut .tv-frame::before{border-radius:50%}
.tv-card.card-pyramid .tv-frame{clip-path:polygon(50% 0%,100% 100%,0% 100%);border:none;padding:6px;overflow:hidden}
.tv-card.card-pyramid .tv-antenna,.tv-card.card-pyramid .tv-led{display:none}
.tv-card.card-pyramid .tv-frame::before{display:none}
.tv-card.card-crystal .tv-frame{clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%);border:none;padding:6px;overflow:hidden}
.tv-card.card-crystal .tv-antenna{display:none}
.tv-card.card-crystal .tv-frame::before{display:none}
.tv-card.card-knot .tv-frame{border-radius:30% 70% 70% 30%/30% 30% 70% 70%;overflow:hidden}
.tv-card.card-knot .tv-antenna{display:none}
.tv-card.card-knot .tv-frame::before{border-radius:30% 70% 70% 30%/30% 30% 70% 70%}

.tv-card{pointer-events:auto;cursor:pointer;transition:opacity .3s;position:relative}
.tv-card .tv-frame{background:#0c0c1a;border:3px solid #222;border-radius:6px;padding:4px;position:relative;box-shadow:0 0 20px rgba(68,221,255,0.08), inset 0 0 15px rgba(0,0,0,0.5)}
.tv-card .tv-frame::before{content:'';position:absolute;inset:0;border-radius:6px;border:1px solid rgba(68,221,255,0.15);pointer-events:none}
.tv-card video{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:2px;filter:brightness(.9) saturate(.95)}
.tv-card:hover video{filter:brightness(1.15) saturate(1.2)}
.tv-card:hover .tv-frame{border-color:#44ddff;box-shadow:0 0 30px rgba(68,221,255,0.2), inset 0 0 15px rgba(0,0,0,0.3)}
.tv-card .tv-base{width:40%;height:4px;margin:4px auto 0;background:linear-gradient(90deg,transparent,#333,transparent);border-radius:2px}
.tv-card .tv-stand{width:3px;height:8px;margin:0 auto;background:#222}
.tv-card .tv-label{text-align:center;font-size:7px;color:#44ddff;letter-spacing:.15em;text-transform:uppercase;margin-top:3px;opacity:0.7}
.tv-card .tv-led{position:absolute;bottom:8px;right:10px;width:4px;height:4px;border-radius:50%;background:#ff2244;box-shadow:0 0 4px #ff2244;animation:ledBlink 3s infinite}
@keyframes ledBlink{0%,90%,100%{opacity:1}45%{opacity:0.3}}
.tv-card .tv-antenna{position:absolute;top:-12px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.tv-card .tv-antenna span{display:block;width:2px;height:14px;background:linear-gradient(to top,#333,#666);border-radius:1px}
.tv-card .tv-antenna span:first-child{transform:rotate(-20deg)}
.tv-card .tv-antenna span:last-child{transform:rotate(20deg)}
.tv-card.back-hidden{opacity:0;pointer-events:none}
.focus-overlay{position:fixed;inset:0;z-index:150;background:rgba(3,3,12,.45);pointer-events:none;opacity:0;transition:opacity .5s}
.focus-overlay.active{opacity:1}

/* Loading screen */
.loading-screen{position:fixed;inset:0;z-index:500;background:#080816;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;transition:opacity .6s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-screen h2{color:#44ddff;font-size:.8rem;letter-spacing:.3em;font-family:'Courier New',monospace;animation:tG 3s infinite}
.loading-screen p{color:#3a4a58;font-size:.45rem;font-family:'Courier New',monospace;letter-spacing:.1em}
</style>
</head>
<body>

<div class="ui-title">📺 TV SOLAR</div>

<script type="importmap">

<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ═══ LOAD VIDEOS FROM SERVER ═══
const staticVideos = [
    { name: 'IMG_0776.MP4', url: 'videos/IMG_0776.MP4' },
    { name: 'copy_012BCC15-2363-4E1A-BCDC-C19EEE80321A.mp4', url: 'videos/copy_012BCC15-2363-4E1A-BCDC-C19EEE80321A.mp4' },
    { name: 'onepiece_demo.mp4', url: 'videos/onepiece_demo.mp4' },
    { name: 'IMG_3922 (1) - Trim.mp4', url: 'videos/IMG_3922 (1) - Trim.mp4' },
    { name: 'JGVG8760.MP4', url: 'videos/JGVG8760.MP4' },
];
let serverVideos = [];
async function fetchVideos() {
    try {
        const res = await fetch('/api/videos');
        if (!res.ok) throw new Error('API not available');
        serverVideos = await res.json();
    } catch(e) {
        console.warn('API not available, using static video list');
        serverVideos = staticVideos;
    }
}

// ═══ UPLOAD ═══
const uploadBtn = document.getElementById('uploadBtn');
const uploadOverlay = document.getElementById('uploadOverlay');
const uploadBox = document.getElementById('uploadBox');
const uploadClose = document.getElementById('uploadClose');
const pickBtn = document.getElementById('pickBtn');
const fileInput = document.getElementById('fileInput');
const uploadProgress = document.getElementById('uploadProgress');

uploadBtn.addEventListener('click', () => uploadOverlay.classList.add('visible'));
uploadClose.addEventListener('click', () => uploadOverlay.classList.remove('visible'));
uploadOverlay.addEventListener('click', e => { if (e.target === uploadOverlay) uploadOverlay.classList.remove('visible'); });
pickBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) doUpload(fileInput.files[0]); });

uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('dragover'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragover'));
uploadBox.addEventListener('drop', e => {
    e.preventDefault();
    uploadBox.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) doUpload(file);
});

async function doUpload(file) {
    uploadBtn.classList.add('uploading');
    uploadBtn.textContent = '⬆ UPLOADING...';
    uploadProgress.style.display = 'block';
    uploadProgress.textContent = 'UPLOADING... 0%';

    const formData = new FormData();
    formData.append('video', file);

    try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload');

        xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) {
                const pct = Math.round(e.loaded / e.total * 100);
                uploadProgress.textContent = `UPLOADING... ${pct}%`;
            }
        });

        const result = await new Promise((resolve, reject) => {
            xhr.onload = () => {
                if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
                else reject(new Error(xhr.statusText));
            };
            xhr.onerror = () => reject(new Error('Upload failed'));
            xhr.send(formData);
        });

        // Add as new planet
        spawnPlanetWithVideo(result.url, result.name);
        uploadOverlay.classList.remove('visible');
    } catch(e) {
        uploadProgress.textContent = 'ERROR: ' + e.message;
    } finally {
        uploadBtn.classList.remove('uploading');
        uploadBtn.textContent = '⬆ UPLOAD VIDEO';
        fileInput.value = '';
        setTimeout(() => { uploadProgress.style.display = 'none'; }, 2000);
    }
}

// ═══ SCENE SETUP ═══
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x080816, 28, 65);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 18);

const gl = new THREE.WebGLRenderer({ antialias:true });
gl.setClearColor(0x080816);
gl.setSize(innerWidth, innerHeight);
gl.setPixelRatio(Math.min(devicePixelRatio, 2));
document.getElementById('c3d').appendChild(gl.domElement);

const css2d = new CSS2DRenderer();
css2d.setSize(innerWidth, innerHeight);
Object.assign(css2d.domElement.style,{position:'absolute',top:'0',left:'0',pointerEvents:'none'});
document.getElementById('c2d').appendChild(css2d.domElement);

// ═══ MODE TOGGLE ═══
let scrollMode = 'rotate';
const mT = document.getElementById('mToggle');
const mL1 = document.getElementById('mL1'), mL2 = document.getElementById('mL2');
mT.addEventListener('click', () => {
    scrollMode = scrollMode==='rotate'?'zoom':'rotate';
    mT.classList.toggle('on', scrollMode==='zoom');
    mL1.classList.toggle('active', scrollMode==='rotate');
    mL2.classList.toggle('active', scrollMode==='zoom');
});

// ═══ SYSTEM GROUP ═══
const systemGroup = new THREE.Group();
scene.add(systemGroup);

// ═══ HELPER: Build 3D TV mesh ═══
function buildTV(w, h, d, color, hasAntenna) {
    const tvGroup = new THREE.Group();
    const c = new THREE.Color(color);
    const bodyGeo = new THREE.BoxGeometry(w, h, d);
    const edgeMat = new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.7 });
    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(bodyGeo), edgeMat);
    tvGroup.add(edges);
    const fillMat = new THREE.MeshBasicMaterial({ color: 0x0a0a18, transparent: true, opacity: 0.85 });
    const fill = new THREE.Mesh(bodyGeo, fillMat);
    tvGroup.add(fill);
    const glowGeo = new THREE.PlaneGeometry(w * 0.88, h * 0.82);
    const glowMat = new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.06, side: THREE.DoubleSide });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.z = d / 2 + 0.01;
    tvGroup.add(glow);
    const standGeo = new THREE.BoxGeometry(w * 0.08, h * 0.35, d * 0.5);
    const standMat = new THREE.MeshBasicMaterial({ color: 0x1a1a2a, transparent: true, opacity: 0.8 });
    const stand = new THREE.Mesh(standGeo, standMat);
    stand.position.y = -h / 2 - h * 0.15;
    tvGroup.add(stand);
    const standEdges = new THREE.LineSegments(new THREE.EdgesGeometry(standGeo), new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.3 }));
    standEdges.position.copy(stand.position);
    tvGroup.add(standEdges);
    const baseGeo = new THREE.BoxGeometry(w * 0.6, h * 0.05, d * 0.8);
    const base = new THREE.Mesh(baseGeo, standMat.clone());
    base.position.y = -h / 2 - h * 0.35;
    tvGroup.add(base);
    const baseEdges = new THREE.LineSegments(new THREE.EdgesGeometry(baseGeo), new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.3 }));
    baseEdges.position.copy(base.position);
    tvGroup.add(baseEdges);
    if (hasAntenna) {
        const antMat = new THREE.LineBasicMaterial({ color: 0x888899 });
        const antL = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-w*0.15, h/2, 0), new THREE.Vector3(-w*0.3, h/2+h*0.5, 0)]);
        const antR = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(w*0.15, h/2, 0), new THREE.Vector3(w*0.3, h/2+h*0.5, 0)]);
        tvGroup.add(new THREE.Line(antL, antMat));
        tvGroup.add(new THREE.Line(antR, antMat));
        const tipMat = new THREE.MeshBasicMaterial({ color: 0x44ddff });
        const tipL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 5, 4), tipMat);
        tipL.position.set(-w*0.3, h/2+h*0.5, 0);
        tvGroup.add(tipL);
        const tipR = new THREE.Mesh(new THREE.SphereGeometry(0.04, 5, 4), tipMat);
        tipR.position.set(w*0.3, h/2+h*0.5, 0);
        tvGroup.add(tipR);
    }
    return { group: tvGroup, fill, edges, edgeMat, glowMat };
}

// ═══ SHAPE BUILDERS ═══
let currentShape = 'TV';

function buildSphere(w, h, d, color) {
    const g = new THREE.Group(); const c = new THREE.Color(color);
    const r = Math.max(w, h) * 0.5;
    const geo = new THREE.SphereGeometry(r, 16, 12);
    const fillMat = new THREE.MeshBasicMaterial({ color: 0x0a0a18, transparent: true, opacity: 0.85 });
    const fill = new THREE.Mesh(geo, fillMat); g.add(fill);
    const edgeMat = new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.7 });

function spawnPlanetWithVideo(url, name) {
    if (bhActive || planets.length >= 10) return;
    const idx = planets.length;
    const ci = planetIdCounter % planetColorPool.length;
    const lastOrbitR = idx > 0 ? planets[idx - 1].orbitR : 2;
    const orbitR = lastOrbitR + 3.5;
    const color = planetColorPool[ci];
    const pName = name || planetNamePool[planetIdCounter % planetNamePool.length];
    const antenna = idx % 2 === 0;
    const tvW = 1.8 + Math.random() * 0.8;
    const tvH = tvW * 0.65;
    const tvD = 0.25 + Math.random() * 0.1;
    const speed = 0.2 / (1 + idx * 0.4);
    const tilt = (Math.random() - 0.5) * 0.3;
    const moonCount = 1 + Math.floor(Math.random() * 2);
    const def = { orbitR, tvW, tvH, tvD, color, speed, tilt, moons: moonCount, name: pName, url, antenna };
    tvDefs.push(def);

    const pGroup = new THREE.Group();
    systemGroup.add(pGroup);

    const ringGeo = new THREE.TorusGeometry(orbitR, 0.015, 8, 120);
    const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.1 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    systemGroup.add(ring);

    const tv = buildShape(currentShape, tvW, tvH, tvD, color, antenna);
    pGroup.add(tv.group);

    const moons = [];
    for (let m = 0; m < moonCount; m++) {
        const mOrbitR = tvW * 1.2 + m * 0.5;
        const mSpeed = 1.2 + m * 0.7;
        const mPhase = m * Math.PI * 2 / moonCount;
        const moRing = new THREE.Mesh(
            new THREE.TorusGeometry(mOrbitR, 0.003, 6, 40),
            new THREE.MeshBasicMaterial({ color: moonColors[(idx + m) % 6], transparent: true, opacity: 0.12 })
        );
        moRing.rotation.x = Math.PI / 2 + (m * 0.25 - 0.12);
        pGroup.add(moRing);
        const mSize = 0.12 + Math.random() * 0.08;
        const mGeo = new THREE.BoxGeometry(mSize * 1.6, mSize, mSize * 0.3);
        const mMat = new THREE.MeshBasicMaterial({ color: moonColors[(idx + m) % 6], wireframe: true });
        const mMesh = new THREE.Mesh(mGeo, mMat);
        pGroup.add(mMesh);
        moons.push({ mesh: mMesh, orbitR: mOrbitR, speed: mSpeed, phase: mPhase, tiltX: m * 0.25 - 0.12 });
    }

    const vid = document.createElement('video');
    vid.src = url;
    vid.loop = true; vid.muted = true; vid.playsInline = true;
    vid.preload = 'metadata'; vid.autoplay = true;
    vid.play().catch(() => {});

    const card = document.createElement('div');
    card.className = 'tv-card card-' + currentShape.toLowerCase();
    card.innerHTML = `
        ${antenna ? '<div class="tv-antenna"><span></span><span></span></div>' : ''}
        <div class="tv-frame"><div class="tv-led"></div></div>
        <div class="tv-stand"></div>
        <div class="tv-base"></div>
        <div class="tv-label">${pName}</div>
    `;
    card.querySelector('.tv-frame').prepend(vid);
    card.addEventListener('mouseenter', () => { vid.muted = false; vid.play().catch(() => {}); });
    card.addEventListener('mouseleave', () => { vid.muted = true; });
    card.addEventListener('click', e => {
        e.stopPropagation();
        const pi = planets.findIndex(p => p.group === pGroup);
        if (pi !== -1) focusOnPlanet(pi);
    });

    const cssObj = new CSS2DObject(card);
    cssObj.position.y = 0;
    pGroup.add(cssObj);
    css2dObjs.push(cssObj);

    planets.push({
        group: pGroup, orbitR, speed, tilt,
        startAngle: Math.random() * Math.PI * 2,
        moons, ringMat, ring, cssObj, tv,
    });
    origOrbitR = planets.map(p => p.orbitR);
    planetIdCounter++;
    document.getElementById('pCount').textContent = planets.length;
}

function spawnPlanet() {
    if (planets.length >= 10 || serverVideos.length === 0) return;
    const vidData = serverVideos[planetIdCounter % serverVideos.length];
    spawnPlanetWithVideo(vidData.url, vidData.name.replace(/^\d+-/, '').replace(/\.[^.]+$/, '').slice(0, 12).toUpperCase());
}

function despawnPlanet() {
    if (bhActive || planets.length <= 1) return;
    unfocus();
    const p = planets.pop();
    tvDefs.pop();
    const vid = p.cssObj.element.querySelector('video');
    if (vid) { vid.pause(); vid.removeAttribute('src'); vid.load(); }
    p.cssObj.removeFromParent();
    if (p.cssObj.element.parentNode) p.cssObj.element.parentNode.removeChild(p.cssObj.element);
    const ci = css2dObjs.indexOf(p.cssObj);
    if (ci !== -1) css2dObjs.splice(ci, 1);
    systemGroup.remove(p.group);
    p.group.traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
        }
    });
    systemGroup.remove(p.ring);
    if (p.ring.geometry) p.ring.geometry.dispose();
    if (p.ring.material) p.ring.material.dispose();
    origOrbitR = planets.map(pp => pp.orbitR);
    document.getElementById('pCount').textContent = planets.length;
}

function updateBlackHole(t) {
    if (!bhActive) return;
    const elapsed = t - bhStartTime;
    if (elapsed >= bhDuration) {
        bhActive = false; bhGroup.visible = false;
        document.getElementById('bhBtn').classList.remove('active');
        planets.forEach((p, i) => { p.orbitR = origOrbitR[i]; });
        charGroup.scale.setScalar(origCharScale);
        starTV.group.scale.setScalar(1);
        systemGroup.scale.setScalar(1);
        particlesMesh.material.opacity = 0.7;
        return;
    }
    const suckEnd = bhDuration * 0.5, holdEnd = bhDuration * 0.7;
    let bhScale;
    if (elapsed < suckEnd) bhScale = THREE.MathUtils.lerp(0.01, 1.5, elapsed / suckEnd);
    else if (elapsed < holdEnd) bhScale = 1.5;
    else bhScale = THREE.MathUtils.lerp(1.5, 0.01, (elapsed - holdEnd) / (bhDuration - holdEnd));
    bhGroup.scale.setScalar(bhScale);
    bhDisk.rotation.z = t*3; bhRing2.rotation.z = -t*5; bhRing3.rotation.z = t*2;
    bhWire.rotation.y = t*1.5; bhWire.rotation.x = t*0.8;
    bhSphere.scale.setScalar(0.8 + Math.sin(t*8)*0.15);
    let suckFactor;
    if (elapsed < suckEnd) suckFactor = elapsed / suckEnd;
    else if (elapsed < holdEnd) suckFactor = 1;
    else suckFactor = 1 - (elapsed - holdEnd) / (bhDuration - holdEnd);
    planets.forEach((p, i) => { if (origOrbitR[i] !== undefined) p.orbitR = THREE.MathUtils.lerp(origOrbitR[i], 0.3, suckFactor); });
    starTV.group.scale.setScalar(THREE.MathUtils.lerp(1, 0.05, suckFactor));
    charGroup.scale.setScalar(THREE.MathUtils.lerp(origCharScale, 0.01, suckFactor));
    targetRotY += suckFactor * 0.03;
    particlesMesh.material.opacity = 0.7 * (1 - suckFactor * 0.8);
    if (suckFactor > 0.5) {
        const shake = (suckFactor - 0.5) * 0.15;
        camera.position.x += (Math.random() - 0.5) * shake;
        camera.position.y += (Math.random() - 0.5) * shake;
    }
    scene.fog.near = THREE.MathUtils.lerp(28, 5, suckFactor);
    scene.fog.far = THREE.MathUtils.lerp(65, 15, suckFactor);
    if (elapsed >= holdEnd) {
        scene.fog.near = THREE.MathUtils.lerp(5, 28, (elapsed - holdEnd) / (bhDuration - holdEnd));
        scene.fog.far = THREE.MathUtils.lerp(15, 65, (elapsed - holdEnd) / (bhDuration - holdEnd));
    }
}

let isDrag = false, wasDrag = false, pMX = 0, pMY = 0, dragDist = 0;
gl.domElement.addEventListener('pointerdown', e => { isDrag = true; wasDrag = false; dragDist = 0; pMX = e.clientX; pMY = e.clientY; });

gl.domElement.addEventListener('click', e => {
    if (wasDrag) return;
    pointer.x = (e.clientX / innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const clickable = [starTV.fill, ...planets.map(p => p.tv.fill)];
    const hits = raycaster.intersectObjects(clickable);
    if (hits.length > 0) {
        const mesh = hits[0].object;
        if (mesh === starTV.fill) { focusOnStar(); return; }
        const idx = planets.findIndex(p => p.tv.fill === mesh);
        if (idx !== -1) focusOnPlanet(idx);
    }
});

window.addEventListener('pointermove', e => {
    if (!isDrag) return;
    const dx = e.clientX - pMX, dy = e.clientY - pMY;
    dragDist += Math.abs(dx) + Math.abs(dy);
    pMX = e.clientX; pMY = e.clientY;
    if (focusedPlanet !== null) {
        focusAngleY += dx * 0.006; focusAngleX += dy * 0.004;
        focusAngleX = Math.max(-1.2, Math.min(1.2, focusAngleX));
    } else {
        targetRotY += dx * 0.004; targetRotX += dy * 0.002;
        targetRotX = Math.max(-0.8, Math.min(0.8, targetRotX));

});

    else targetDist += e.deltaY * 0.012;
}, { passive: false });
document.getElementById('zi').addEventListener('click', () => { targetDist -= 2; });
document.getElementById('zo').addEventListener('click', () => { targetDist += 2; });

// ═══ KEYBOARD ═══
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.key === 'Escape') unfocus(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
function handleKeys() {
    if (focusedPlanet !== null) return;
    const s = 0.018;
    if (keys['a'] || keys['arrowleft']) targetRotY -= s;
    if (keys['d'] || keys['arrowright']) targetRotY += s;
    if (keys['w'] || keys['arrowup']) targetRotX -= s * 0.5;
    if (keys['s'] || keys['arrowdown']) targetRotX += s * 0.5;
    if (keys['q']) targetDist -= 0.15;
    if (keys['e']) targetDist += 0.15;
    targetRotX = Math.max(-0.8, Math.min(0.8, targetRotX));
}

// ═══ FOCUS ═══
let focusedPlanet = null;
let focusAngleY = 0, focusAngleX = 0.25, focusZoom = 1;
const focusOv = document.getElementById('focusOv');
const focusWorldPos = new THREE.Vector3();
const camPosTarget = new THREE.Vector3(0, 4, 18);
const camLookTarget = new THREE.Vector3(0, 0, 0);
const curCamPos = new THREE.Vector3(0, 4, 18);
const curCamLook = new THREE.Vector3(0, 0, 0);

function focusOnPlanet(i) {
    if (focusedPlanet === i) { unfocus(); return; }
    focusedPlanet = i;
    focusOv.classList.add('active');
    planets[i].group.getWorldPosition(focusWorldPos);
    focusAngleY = Math.atan2(curCamPos.x - focusWorldPos.x, curCamPos.z - focusWorldPos.z);
    focusAngleX = 0.25; focusZoom = 1;
}
function focusOnStar() {
    if (focusedPlanet === 'star') { unfocus(); return; }
    focusedPlanet = 'star';
    focusOv.classList.add('active');
    focusWorldPos.set(0, 0, 0);
    systemGroup.localToWorld(focusWorldPos);
    focusAngleY = Math.atan2(curCamPos.x - focusWorldPos.x, curCamPos.z - focusWorldPos.z);
    focusAngleX = 0.25; focusZoom = 1;
}
function unfocus() {
    focusedPlanet = null;
    focusOv.classList.remove('active');
    targetDist = 18; targetCamY = 4;
}
document.getElementById('resetBtn').addEventListener('click', () => {
    unfocus(); targetRotY = 0; targetRotX = 0; targetDist = 18; targetCamY = 4;
});

// ═══ SHAPE SWITCHER ═══
const shapeClasses = ['card-tv','card-sphere','card-diamond','card-cube','card-donut','card-pyramid','card-crystal','card-knot'];
function applyCardShape(el, shape) {
    shapeClasses.forEach(c => el.classList.remove(c));
    el.classList.add('card-' + shape.toLowerCase());
}
function rebuildAllShapes(type) {
    if (bhActive) return;
    currentShape = type;
    systemGroup.remove(starTV.group);
    starTV = buildShape(type, 3.2, 2.2, 0.4, 0xff6600, true);
    starTV.group.position.y = 0;
    systemGroup.add(starTV.group);
    applyCardShape(starCard, type);
    planets.forEach((p, i) => {
        const def = tvDefs[i];
        p.group.remove(p.tv.group);
        p.tv = buildShape(type, def.tvW, def.tvH, def.tvD, def.color, def.antenna);
        p.group.add(p.tv.group);
        applyCardShape(p.cssObj.element, type);
    });
    document.querySelectorAll('.shape-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.shape === type);
    });
}
document.querySelectorAll('.shape-btn').forEach(btn => {
    btn.addEventListener('click', () => rebuildAllShapes(btn.dataset.shape));
});

// ═══ VISIBILITY ═══
const _wp = new THREE.Vector3(), _dir = new THREE.Vector3();
function updateVis() {
    css2dObjs.forEach(obj => {
        obj.getWorldPosition(_wp);
        _dir.copy(_wp).sub(camera.position);
        const dist = _dir.length();
        if (dist > 40) {
            obj.element.classList.add('back-hidden');
        } else {
            obj.element.classList.remove('back-hidden');
            const fade = THREE.MathUtils.smoothstep(dist, 28, 40);
            obj.element.style.opacity = 1 - fade;
            const minW = 80, maxW = 320;
            const s = THREE.MathUtils.smoothstep(dist, 2, 22);
            const w = maxW - s * (maxW - minW);
            obj.element.style.width = w + 'px';
        }
    });
}

// ═══ ANIMATE ═══
const clock = new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    handleKeys();

    curRotY += (targetRotY - curRotY) * 0.06;
    curRotX += (targetRotX - curRotX) * 0.06;
    targetDist = Math.max(5, Math.min(35, targetDist));
    curDist += (targetDist - curDist) * 0.05;
    curCamY += (targetCamY - curCamY) * 0.05;

    systemGroup.rotation.y = curRotY;
    systemGroup.rotation.x = curRotX;

    planets.forEach((p, i) => {
        const angle = p.startAngle + t * p.speed;
        const x = Math.cos(angle) * p.orbitR;
        const z = Math.sin(angle) * p.orbitR;
        const y = Math.sin(angle * 0.5) * p.tilt * p.orbitR * 0.08;
        p.group.position.set(x, y, z);
        p.tv.group.rotation.y = -angle + Math.PI;
        p.ringMat.opacity = 0.06 + Math.sin(t + i) * 0.04;
        p.tv.glowMat.opacity = 0.04 + Math.sin(t * 2 + i) * 0.03;
        p.moons.forEach(m => {
            const ma = t * m.speed + m.phase;
            m.mesh.position.set(Math.cos(ma)*m.orbitR, Math.sin(ma)*Math.sin(m.tiltX)*m.orbitR*0.3, Math.sin(ma)*m.orbitR);
            m.mesh.rotation.y = t * 2;
        });
    });

    starTV.group.rotation.y = t * 0.15;
    starTV.glowMat.opacity = 0.05 + Math.sin(t * 1.5) * 0.03;
    starTV.edgeMat.opacity = 0.6 + Math.sin(t * 2) * 0.15;

    systemGroup.updateMatrixWorld(true);

    if (focusedPlanet !== null) {
        let fDist;
        if (focusedPlanet === 'star') {
            focusWorldPos.set(0, 0, 0); systemGroup.localToWorld(focusWorldPos);
            fDist = (starR * 2.5 + 2) * focusZoom;
        } else {
            planets[focusedPlanet].group.getWorldPosition(focusWorldPos);
            const def = tvDefs[focusedPlanet];
            fDist = (def.tvW * 2.5 + 1.5) * focusZoom;
        }
        camPosTarget.set(
            focusWorldPos.x + Math.sin(focusAngleY) * Math.cos(focusAngleX) * fDist,
            focusWorldPos.y + Math.sin(focusAngleX) * fDist + 0.5,
            focusWorldPos.z + Math.cos(focusAngleY) * Math.cos(focusAngleX) * fDist
        );
        camLookTarget.copy(focusWorldPos);
    } else {
        camPosTarget.set(0, curCamY, curDist);
        camLookTarget.set(0, 0, 0);
    }
    curCamPos.lerp(camPosTarget, 0.05);
    curCamLook.lerp(camLookTarget, 0.05);
    camera.position.copy(curCamPos);
    camera.lookAt(curCamLook);

    const cOrbitR = 8, cAngle = t * 0.18;
    charGroup.position.set(Math.cos(cAngle)*cOrbitR, Math.sin(t*0.5)*1.5+1, Math.sin(cAngle)*cOrbitR);
    charGroup.rotation.y = -cAngle + Math.PI / 2;
    aL.rotation.x = Math.sin(t*3)*0.5; aR.rotation.x = -Math.sin(t*3)*0.5;
    lL.rotation.x = Math.sin(t*3)*0.4; lR.rotation.x = -Math.sin(t*3)*0.4;
    antTip.visible = Math.sin(t*5) > 0;

    particlesMesh.rotation.y -= 0.0004;
    updateBlackHole(t);
    updateVis();
    gl.render(scene, camera);
    css2d.render(scene, camera);
}
animate();

// ═══ INIT: Load videos from server and build planets ═══
async function init() {
    await fetchVideos();
    if (serverVideos.length > 0) {
        // First video = star
        starVidUrl = serverVideos[0].url;
        starVid.src = starVidUrl;
        starVid.play().catch(() => {});
        // Rest = planets
        for (let i = 1; i < serverVideos.length && i < 6; i++) {
            const v = serverVideos[i];
            const name = v.name.replace(/^\d+-/, '').replace(/\.[^.]+$/, '').slice(0, 12).toUpperCase();
            spawnPlanetWithVideo(v.url, name);
        }
    }
    document.getElementById('loadScreen').classList.add('hidden');
    setTimeout(() => { document.getElementById('loadScreen').style.display = 'none'; }, 700);
}
init();

// ═══ NOISE ═══
const nC = document.getElementById('noise'); nC.width = 180; nC.height = 180;
const nX = nC.getContext('2d');
function drawN() {
    const img = nX.createImageData(180, 180);
    for (let i = 0; i < img.data.length; i += 4) {
        const v = Math.random() * 255;
        img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255;
    }
    nX.putImageData(img, 0, 0);
    requestAnimationFrame(drawN);
}
drawN();

// ═══ RESIZE ═══
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    gl.setSize(innerWidth, innerHeight);
    css2d.setSize(innerWidth, innerHeight);
});
</script>
